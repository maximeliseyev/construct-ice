name: Fuzz (weekly)

# Run weekly to catch regressions introduced between releases.
# Also run on manual dispatch for ad-hoc investigation.
on:
  schedule:
    - cron: '0 2 * * 0'  # every Sunday at 02:00 UTC
  workflow_dispatch:
    inputs:
      duration_seconds:
        description: 'Fuzzing duration per target (seconds)'
        required: false
        default: '3600'

env:
  CARGO_TERM_COLOR: always
  # Default to 1 hour per target; workflow_dispatch can override.
  FUZZ_DURATION: ${{ github.event.inputs.duration_seconds || '3600' }}

jobs:
  fuzz:
    name: Fuzz (${{ matrix.target }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        target:
          - fuzz_frame_decoder
          - fuzz_cover_classify
          - fuzz_length_obfuscator
          - fuzz_replay_filter
          - fuzz_elligator2
          - fuzz_bridge_cert
          - fuzz_handshake_scan

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (nightly — required by cargo-fuzz)
        uses: dtolnay/rust-toolchain@nightly

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: fuzz-cargo-${{ hashFiles('fuzz/Cargo.lock') }}
          restore-keys: fuzz-cargo-

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked

      # Restore seed corpus from previous runs (best-effort).
      - name: Restore corpus cache
        uses: actions/cache/restore@v4
        with:
          path: fuzz/corpus/${{ matrix.target }}
          key: fuzz-corpus-${{ matrix.target }}-${{ github.run_id }}
          restore-keys: fuzz-corpus-${{ matrix.target }}-

      - name: Run fuzzer
        run: |
          cargo fuzz run ${{ matrix.target }} \
            -- \
            -max_total_time=${{ env.FUZZ_DURATION }} \
            -timeout=30 \
            -max_len=16384 \
            2>&1 | tee fuzz-${{ matrix.target }}.log
        # cargo fuzz exits non-zero only on crash/OOM/timeout-per-input.
        # Time limit expiry exits 0.

      # Save the corpus so future runs start from accumulated coverage.
      - name: Save corpus cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: fuzz/corpus/${{ matrix.target }}
          key: fuzz-corpus-${{ matrix.target }}-${{ github.run_id }}

      # Upload crash artifacts so engineers can reproduce locally.
      - name: Upload crash artifacts
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: fuzz-crash-${{ matrix.target }}
          path: |
            fuzz/artifacts/${{ matrix.target }}/
            fuzz-${{ matrix.target }}.log
          retention-days: 90
